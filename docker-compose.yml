# ── Docker Compose ─────────────────────────────────────────────────────────────
# Run: docker-compose up --build

services:

  # ── MLflow Tracking Server ────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: heart-mlflow
    working_dir: /app
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_FLASK_SERVER_SECRET_KEY=secret
      - GUNICORN_CMD_ARGS=--forwarded-allow-ips="*"
      - MLFLOW_DISABLE_HOST_CHECK=true
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////app/mlflow.db
      --default-artifact-root file:///app/mlruns
      --cors-allowed-origins "*"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Backend: FastAPI ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: heart-backend
    ports:
      - "8000:8000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./data:/app/data
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_DISABLE_HOST_CHECK=true
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend: React ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: heart-frontend
    ports:
      - "3002:5173"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: heart-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: heart-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped